<div class="glass-card room-card" [routerLink]="['/room', room.id]">
  <div class="room-preview-container">
    @for (img of images; track img; let i = $index) {
      <div
        class="room-preview"
        [class.active]="i === currentImageIndex"
        [style.backgroundImage]="'url(' + img + ')'">
      </div>
    }
    @if (images.length === 0) {
      <div class="no-preview"></div>
    }
  </div>
  <div class="room-overlay"></div>
  <div class="room-content-wrapper">
    <div class="room-info">
      <h3 [class.is-finished]="room.status === 'Fertig'">{{ room.name }}</h3>
      <p>
        {{ room.area }} m²
        @if (room.area_derivation) {
          <span class="derivation-hint">({{ room.area_derivation }})</span>
        }
      </p>
      <app-status-badge [status]="room.status"></app-status-badge>
    </div>
  </div>
</div>
