<div class="floor-plan-container glass-card">
  <div class="floor-plan-header">
    <div class="header-content">
      <h3>Interaktiver Grundriss</h3>
      <p class="subtitle">Wählen Sie ein Stockwerk und klicken Sie auf einen Raum.</p>
    </div>
    <div class="view-toggle">
      <button [class.active]="currentView === 'eg'" (click)="currentView = 'eg'">Erdgeschoss</button>
      <button [class.active]="currentView === 'keller'" (click)="currentView = 'keller'">Keller / UG</button>
    </div>
  </div>
  
  <!-- ERDGESCHOSS VIEW -->
  <svg *ngIf="currentView === 'eg'" viewBox="0 0 1100 850" xmlns="http://www.w3.org/2000/svg" class="floor-plan-svg">
    <defs>
      <filter id="roomShadow" x="-2%" y="-2%" width="104%" height="104%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
      </filter>
    </defs>

    <!-- Garage -->
    <g class="room garage" (click)="onRoomClick('garage')" 
       [class.active]="activeRoomId === 'garage'"
       [class.status-finished]="getRoomStatus('garage') === 'Fertig'"
       [class.status-working]="getRoomStatus('garage') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('garage') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('garage') === 'In Planung'">
      <rect x="20" y="40" width="180" height="505" rx="4" fill="none" stroke="#dfe4e8" stroke-dasharray="4" />
      <text x="110" y="280" class="room-label opacity-60">Garage</text>
      <text x="110" y="300" class="room-detail opacity-60">{{ roomService.getRoomById('garage')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- Wohnzimmer -->
    <g class="room" (click)="onRoomClick('wohnraum')" 
       [class.active]="activeRoomId === 'wohnraum'"
       [class.status-finished]="getRoomStatus('wohnraum') === 'Fertig'"
       [class.status-working]="getRoomStatus('wohnraum') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('wohnraum') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('wohnraum') === 'In Planung'">
      <rect x="230" y="40" width="334" height="218" rx="2" />
      <text x="397" y="130" class="room-label">Wohnzimmer</text>
      <text x="397" y="150" class="room-area">{{ roomService.getRoomById('wohnraum')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- Küche -->
    <g class="room" (click)="onRoomClick('kueche')" 
       [class.active]="activeRoomId === 'kueche'"
       [class.status-finished]="getRoomStatus('kueche') === 'Fertig'"
       [class.status-working]="getRoomStatus('kueche') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('kueche') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('kueche') === 'In Planung'">
      <rect x="230" y="258" width="190" height="180" rx="2" />
      <text x="325" y="325" class="room-label">Küche</text>
      <text x="325" y="345" class="room-detail">{{ roomService.getRoomById('kueche')?.area_derivation }}</text>
      <text x="325" y="360" class="room-area">{{ roomService.getRoomById('kueche')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- Flur -->
    <g class="room" (click)="onRoomClick('flur')" 
       [class.active]="activeRoomId === 'flur'"
       [class.status-finished]="getRoomStatus('flur') === 'Fertig'"
       [class.status-working]="getRoomStatus('flur') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('flur') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('flur') === 'In Planung'">
      <rect x="420" y="258" width="264" height="180" rx="2" />
      <text x="552" y="345" class="room-label">Flur</text>
      <text x="552" y="370" class="room-area">{{ roomService.getRoomById('flur')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- Bad -->
    <g class="room" (click)="onRoomClick('bad')" 
       [class.active]="activeRoomId === 'bad'"
       [class.status-finished]="getRoomStatus('bad') === 'Fertig'"
       [class.status-working]="getRoomStatus('bad') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('bad') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('bad') === 'In Planung'">
      <rect x="564" y="40" width="120" height="218" rx="2" />
      <text x="624" y="135" class="room-label-small">Bad</text>
      <text x="624" y="163" class="room-area-tiny">{{ roomService.getRoomById('bad')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- Schlafzimmer -->
    <g class="room" (click)="onRoomClick('schlafzimmer')" 
       [class.active]="activeRoomId === 'schlafzimmer'"
       [class.status-finished]="getRoomStatus('schlafzimmer') === 'Fertig'"
       [class.status-working]="getRoomStatus('schlafzimmer') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('schlafzimmer') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('schlafzimmer') === 'In Planung'">
      <rect x="684" y="40" width="233" height="398" rx="2" />
      <text x="800" y="220" class="room-label">Schlafzimmer</text>
      <text x="800" y="255" class="room-area">{{ roomService.getRoomById('schlafzimmer')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- WC -->
    <g class="room" (click)="onRoomClick('wc')" 
       [class.active]="activeRoomId === 'wc'"
       [class.status-finished]="getRoomStatus('wc') === 'Fertig'"
       [class.status-working]="getRoomStatus('wc') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('wc') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('wc') === 'In Planung'">
      <rect x="420" y="438" width="100" height="117" rx="2" />
      <text x="470" y="495" class="room-label-small">WC</text>
      <text x="470" y="515" class="room-area-tiny">{{ roomService.getRoomById('wc')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- Zimmer / Büro -->
    <g class="room" (click)="onRoomClick('zimmer')" 
       [class.active]="activeRoomId === 'zimmer'"
       [class.status-finished]="getRoomStatus('zimmer') === 'Fertig'"
       [class.status-working]="getRoomStatus('zimmer') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('zimmer') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('zimmer') === 'In Planung'">
      <rect x="520" y="438" width="164" height="117" rx="2" />
      <text x="602" y="495" class="room-label-small">Zimmer 1</text>
      <text x="602" y="515" class="room-area-tiny">{{ roomService.getRoomById('zimmer')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- Zimmer 2 -->
    <g class="room" (click)="onRoomClick('zimmer2')"
       [class.active]="activeRoomId === 'zimmer2'"
       [class.status-finished]="getRoomStatus('zimmer2') === 'Fertig'"
       [class.status-working]="getRoomStatus('zimmer2') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('zimmer2') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('zimmer2') === 'In Planung'">
      <rect x="700" y="380" width="200" height="230" class="room-rect"/>
      <text x="800" y="495" class="room-label">Zimmer 2</text>
      <text x="800" y="515" class="room-area-tiny">{{ roomService.getRoomById('zimmer2')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>
  </svg>

  <!-- KELLER VIEW -->
  <svg *ngIf="currentView === 'keller'" viewBox="0 0 1100 850" xmlns="http://www.w3.org/2000/svg" class="floor-plan-svg">
    <!-- KELLERRAUM 2 -->
    <g class="room secondary" (click)="onRoomClick('kellerflur')">
      <rect x="230" y="40" width="190" height="120" rx="2" />
      <text x="325" y="105" class="room-label-small">Keller 2</text>
    </g>

    <!-- KELLERRAUM 1 -->
    <g class="room secondary" (click)="onRoomClick('kellerflur')">
      <rect x="230" y="160" width="190" height="120" rx="2" />
      <text x="325" y="225" class="room-label-small">Keller 1</text>
    </g>

    <!-- HEIZRAUM -->
    <g class="room secondary" (click)="onRoomClick('kellerflur')">
      <rect x="230" y="280" width="190" height="250" rx="2" />
      <text x="325" y="405" class="room-label-small">Heizraum</text>
    </g>

    <!-- KELLERFLUR -->
    <g class="room" (click)="onRoomClick('kellerflur')" 
       [class.active]="activeRoomId === 'kellerflur'"
       [class.status-finished]="getRoomStatus('kellerflur') === 'Fertig'"
       [class.status-working]="getRoomStatus('kellerflur') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('kellerflur') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('kellerflur') === 'In Planung'">
      <rect x="420" y="280" width="264" height="250" rx="2" />
      <text x="552" y="390" class="room-label-small">Kellerflur</text>
      <text x="552" y="410" class="room-label-tiny opacity-40">Spielbereich</text>
      <text x="552" y="435" class="room-area-tiny">{{ roomService.getRoomById('kellerflur')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- BÜRO KELLER -->
    <g class="room" (click)="onRoomClick('keller_buero')" 
       [class.active]="activeRoomId === 'keller_buero'"
       [class.status-finished]="getRoomStatus('keller_buero') === 'Fertig'"
       [class.status-working]="getRoomStatus('keller_buero') === 'In Arbeit'"
       [class.status-paused]="getRoomStatus('keller_buero') === 'Pausiert'"
       [class.status-planned]="getRoomStatus('keller_buero') === 'In Planung'">
      <rect x="684" y="280" width="233" height="250" rx="2" />
      <text x="800" y="405" class="room-label-small">Büro</text>
      <text x="800" y="430" class="room-area-tiny">{{ roomService.getRoomById('keller_buero')?.area | number:'1.2-2':'de-DE' }} m²</text>
    </g>

    <!-- ANSCHLUSSKELLER -->
    <g class="room secondary" (click)="onRoomClick('kellerflur')">
      <rect x="420" y="530" width="132" height="120" rx="2" />
      <text x="486" y="585" class="room-label-tiny">Anschluss</text>
    </g>

    <!-- WASCHRAUM -->
    <g class="room secondary" (click)="onRoomClick('kellerflur')">
      <rect x="552" y="530" width="132" height="120" rx="2" />
      <text x="618" y="585" class="room-label-tiny">Waschraum</text>
    </g>

    <!-- TROCKENRAUM -->
    <g class="room secondary" (click)="onRoomClick('kellerflur')">
      <rect x="684" y="530" width="233" height="120" rx="2" />
      <text x="800" y="585" class="room-label-tiny">Trockenraum</text>
      <text x="800" y="605" class="room-detail-tiny">28,88 m²</text>
    </g>
  </svg>
</div>
