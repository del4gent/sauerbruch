<div class="dashboard">
  <header class="hero-header">
    <div class="hero-image" style="background-image: url('assets/plan/house_hero.jpg')"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content-container">
      <div class="hero-content">
        <div class="hero-title-group">
          <span class="hero-pretitle">HAUSPLANUNG & RENOVIERUNG</span>
          <h1 class="hero-main-title">SAUERBRUCH 3</h1>
        </div>
        
        <div class="stats-grid">
          <app-stat-card 
            label="Gesamtfortschritt" 
            [value]="totalProgress + '%'" 
            [progress]="totalProgress" 
            link="/details/progress">
          </app-stat-card>

          <app-stat-card 
            label="Gesamtfläche" 
            [value]="roomService.totalArea().toLocaleString('de-DE') + ' m²'" 
            link="/details/area">
          </app-stat-card>
        </div>
      </div>
    </div>
  </header>

  <section class="rooms-section">
    <div class="section-header">
      <h2>Raumplanung</h2>
    </div>
    
    <div class="room-grid">
      <app-room-card *ngFor="let room of roomService.sortedRooms()" 
        [room]="room" 
        [images]="roomService.getRoomDisplayImages(room.id)" 
        [currentImageIndex]="currentImageIndices[room.id]">
      </app-room-card>
    </div>
  </section>
</div>
