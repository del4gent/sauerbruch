<div class="app-container" *ngIf="isAuthorized(); else loginTpl">
  <header class="top-nav">
    <div class="nav-container">
      <div class="nav-brand" routerLink="/">
        <span class="logo-icon">🏠</span>
        <span class="logo-text">Sauerbruch 3</span>
      </div>
      
      <nav class="nav-links desktop-only">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Dashboard</a>
        
        <div class="nav-dropdown">
          <span class="dropdown-trigger">Räume</span>
          <div class="dropdown-content glass-card">
            <div class="dropdown-section">
              <span class="section-title">In Planung</span>
              <a *ngFor="let room of activeRooms()" [routerLink]="['/room', room.id]" routerLinkActive="active" class="dropdown-item">
                {{ getRoomEmoji(room.id) }} {{ room.name }}
              </a>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-section">
              <span class="section-title">Weitere</span>
              <a *ngFor="let room of otherRooms()" [routerLink]="['/room', room.id]" routerLinkActive="active" class="dropdown-item">
                {{ getRoomEmoji(room.id) }} {{ room.name }}
              </a>
            </div>
          </div>
        </div>
        
        <a routerLink="/details/area" routerLinkActive="active" class="nav-link">Flächen</a>
        <a routerLink="/details/budget" routerLinkActive="active" class="nav-link">Budget</a>
      </nav>

      <div class="nav-actions">
        <button class="theme-toggle" (click)="isDarkMode.set(!isDarkMode()); applyTheme()">
          {{ isDarkMode() ? '☀️' : '🌙' }}
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile Bottom Nav (Keep for Handwerker-Ergonomie) -->
  <nav class="mobile-nav mobile-only">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="mobile-nav-item">
      <span class="icon">📊</span>
      <span class="label">Dashboard</span>
    </a>
    <a *ngFor="let room of activeRooms().slice(0, 3)" [routerLink]="['/room', room.id]" routerLinkActive="active" class="mobile-nav-item">
      <span class="icon">{{ getRoomEmoji(room.id) }}</span>
      <span class="label">{{ room.name }}</span>
    </a>
    <a routerLink="/details/progress" routerLinkActive="active" class="mobile-nav-item">
      <span class="icon">✅</span>
      <span class="label">Status</span>
    </a>
  </nav>
</div>

<ng-template #loginTpl>
  <div class="login-screen">
    <div class="glass-card login-card">
      <h1>Sauerbruch 3</h1>
      <p>Bitte gib das Passwort ein, um die Planung zu sehen.</p>
      <div class="login-input-wrapper">
        <input #pwdInput type="password" (input)="checkPassword($event)" (keyup.enter)="checkPassword(pwdInput.value)" placeholder="Passwort..." autofocus>
        <button class="btn-primary" (click)="checkPassword(pwdInput.value)">Anmelden</button>
      </div>
    </div>
  </div>
</ng-template>
