<div *ngIf="!isAuthorized()" class="auth-wrapper">
  <div class="auth-card">
    <h1>Sauerbruch 3</h1>
    <p>Bitte Passwort eingeben</p>
    <input type="password" (input)="checkPassword($event)" placeholder="Passwort..." autofocus />
  </div>
</div>

<div *ngIf="isAuthorized()" class="layout-wrapper" [class.sidebar-collapsed]="isSidebarCollapsed()">
  <aside class="sidebar" [class.collapsed]="isSidebarCollapsed()">
    <div class="sidebar-header">
      <h1 *ngIf="!isSidebarCollapsed()">Sauerbruch 3</h1>
      <button (click)="toggleSidebar()" class="sidebar-toggle">
        {{ isSidebarCollapsed() ? '➡️' : '⬅️' }}
      </button>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
      <div class="nav-section">Räume</div>
      <a *ngFor="let room of rooms" 
         [routerLink]="['/room', room.id]" 
         routerLinkActive="active">
        {{ room.name }}
      </a>
    </nav>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
