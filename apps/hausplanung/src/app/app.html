<div class="layout-wrapper" [class.sidebar-collapsed]="isSidebarCollapsed()" *ngIf="isAuthorized(); else loginTpl">
  <aside class="sidebar" [class.collapsed]="isSidebarCollapsed()">
    <div class="sidebar-header">
      <div class="logo-container" *ngIf="!isSidebarCollapsed()">
        <span class="logo-text">Sauerbruch 3</span>
      </div>
      <button (click)="toggleSidebar()" class="sidebar-toggle" [title]="isSidebarCollapsed() ? 'Expand' : 'Collapse'">
        <svg *ngIf="isSidebarCollapsed()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        <svg *ngIf="!isSidebarCollapsed()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        </div>
        <span class="label" *ngIf="!isSidebarCollapsed()">Dashboard</span>
      </a>

      <div class="nav-separator" [class.centered]="isSidebarCollapsed()">
        <span class="separator-text" *ngIf="!isSidebarCollapsed()">In Planung</span>
        <div class="separator-line" *ngIf="isSidebarCollapsed()"></div>
      </div>

      <!-- Active Rooms -->
      <a *ngFor="let room of activeRooms()" 
         [routerLink]="['/room', room.id]" 
         routerLinkActive="active"
         class="nav-item"
         [title]="isSidebarCollapsed() ? room.name : ''">
        <div class="icon">
          {{ getRoomEmoji(room.id) }}
        </div>
        <span class="label" *ngIf="!isSidebarCollapsed()">{{ room.name }}</span>
      </a>

      <!-- Other Rooms Tree -->
      <div class="nav-tree-container">
        <div class="nav-item tree-header" 
             (click)="toggleOtherRooms($event)"
             [class.active]="isOtherRoomsExpanded() && !isSidebarCollapsed()"
             [title]="isSidebarCollapsed() ? 'Weitere Räume' : ''">
          <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" [class.rotated]="isOtherRoomsExpanded()"><path d="m9 18 6-6-6-6"/></svg>
          </div>
          <span class="label" *ngIf="!isSidebarCollapsed()">Weitere Räume</span>
        </div>

        <div class="tree-content" *ngIf="isOtherRoomsExpanded() && !isSidebarCollapsed()">
          <a *ngFor="let room of otherRooms()" 
             [routerLink]="['/room', room.id]" 
             routerLinkActive="active"
             class="nav-item sub-item">
            <div class="icon sub-icon">
              {{ getRoomEmoji(room.id) }}
            </div>
            <span class="label">{{ room.name }}</span>
          </a>
        </div>
      </div>
    </nav>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>

<ng-template #loginTpl>
  <div class="login-screen">
    <div class="glass-card login-card">
      <h1>Sauerbruch 3</h1>
      <p>Bitte gib das Passwort ein, um die Planung zu sehen.</p>
      <input type="password" (input)="checkPassword($event)" placeholder="Passwort..." autofocus>
    </div>
  </div>
</ng-template>
