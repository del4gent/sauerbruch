<div class="app-container" *ngIf="roomService.isAuthorized(); else loginTpl">
  <header class="top-nav" *ngIf="roomService.breadcrumbTitle()">
    <div class="nav-container">
      <div class="nav-brand" routerLink="/">
        <nav class="header-breadcrumb">
          <span class="breadcrumb-item">Dashboard</span>
          <span class="breadcrumb-separator">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </span>
          <span class="breadcrumb-current">{{ roomService.breadcrumbTitle() }}</span>
        </nav>
      </div>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<ng-template #loginTpl>
  <div class="login-screen">
    <div class="glass-card login-card">
      <h1 class="gradient-text">SAUERBRUCH 3</h1>
      <p style="text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; opacity: 0.5; font-weight: 500; margin-top: -1rem; margin-bottom: 2rem;">Hausplanung & Renovierung</p>
      <p>Bitte gib das Passwort ein, um die Planung zu sehen.</p>
      <div class="login-input-wrapper">
        <input #pwdInput type="password" (input)="checkPassword($event)" (keyup.enter)="checkPassword(pwdInput.value)" placeholder="Passwort..." autofocus>
        <button class="btn-primary" (click)="checkPassword(pwdInput.value)">Anmelden</button>
      </div>
    </div>
  </div>
</ng-template>
